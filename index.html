<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Simulator</title>

<style>

body{
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
background:#0f172a;
color:white;
margin:0;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.step{
margin-top:20px;
padding:15px;
background:#0f172a;
border-radius:8px;
border-left:4px solid #3b82f6;
}

.docs{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
margin-top:10px;
}

.doc{
background:#334155;
padding:10px;
border-radius:8px;
font-size:14px;
}

.highlight{
border:2px solid #22c55e;
}

.prompt{
background:#111827;
padding:15px;
border-radius:8px;
font-family:monospace;
white-space:pre-wrap;
}

.answer{
font-size:18px;
margin-top:10px;
color:#a5f3fc;
}

</style>
</head>

<body>

<div class="container">

<h1>RAG Simulator</h1>

<div class="card">

<label>Ask a Question</label>
<input id="question" placeholder="Example: What is Agile methodology?">

<button onclick="runRAG()">Run RAG Pipeline</button>

</div>


<div class="card">

<h3>Knowledge Base</h3>

<div id="docs" class="docs"></div>

</div>


<div class="card">

<h3>RAG Steps</h3>

<div id="steps"></div>

</div>

</div>



<script>

const knowledgeBase = [

"Agile is a software development methodology focused on iterative development and collaboration.",

"Scrum is a framework within Agile that uses sprints and roles like Product Owner and Scrum Master.",

"Machine learning allows systems to learn patterns from data without explicit programming.",

"Retrieval Augmented Generation (RAG) combines document retrieval with language model generation.",

"Vector databases store embeddings and enable semantic search.",

"Product discovery focuses on identifying real user problems before building features."

]

function renderDocs(){

const container = document.getElementById("docs")

knowledgeBase.forEach((doc,i)=>{

const div=document.createElement("div")
div.className="doc"
div.id="doc"+i
div.innerText=doc

container.appendChild(div)

})

}

renderDocs()



function fakeEmbedding(text){

return text
.toLowerCase()
.split(" ")
.map(word=>word.charCodeAt(0))

}



function similarity(q,doc){

let score=0

q.forEach(v=>{
doc.forEach(d=>{
if(Math.abs(v-d)<3){
score++
}
})
})

return score

}



function runRAG(){

const question=document.getElementById("question").value

const steps=document.getElementById("steps")
steps.innerHTML=""

document.querySelectorAll(".doc").forEach(d=>{
d.classList.remove("highlight")
})



const embedStep=document.createElement("div")
embedStep.className="step"
embedStep.innerHTML="<b>Step 1: Create Question Embedding</b>"
steps.appendChild(embedStep)



const qEmbedding=fakeEmbedding(question)

embedStep.innerHTML+= "<br>"+JSON.stringify(qEmbedding)



const retrieveStep=document.createElement("div")
retrieveStep.className="step"
retrieveStep.innerHTML="<b>Step 2: Vector Similarity Search</b>"
steps.appendChild(retrieveStep)



let scoredDocs=knowledgeBase.map((doc,i)=>{

const score=similarity(qEmbedding,fakeEmbedding(doc))

return {doc,index:i,score}

})



scoredDocs.sort((a,b)=>b.score-a.score)

const topDocs=scoredDocs.slice(0,2)



retrieveStep.innerHTML+="<br>Top documents selected"



topDocs.forEach(d=>{
document.getElementById("doc"+d.index).classList.add("highlight")
})



const promptStep=document.createElement("div")
promptStep.className="step"
promptStep.innerHTML="<b>Step 3: Construct Prompt for LLM</b>"

const context=topDocs.map(d=>d.doc).join("\n")

const prompt=
`Answer the question using the context.

Context:
${context}

Question:
${question}`

promptStep.innerHTML+=`<div class="prompt">${prompt}</div>`

steps.appendChild(promptStep)



const answerStep=document.createElement("div")
answerStep.className="step"
answerStep.innerHTML="<b>Step 4: LLM Generates Answer</b>"

const answer="Based on the retrieved documents, the answer relates to: " + context

answerStep.innerHTML+=`<div class="answer">${answer}</div>`

steps.appendChild(answerStep)

}

</script>

</body>
</html>
