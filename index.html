<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Simulator</title>

<style>

body{
font-family: system-ui, -apple-system, Segoe UI, Roboto;
background:#0f172a;
color:white;
margin:0;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.step{
margin-top:20px;
padding:15px;
background:#0f172a;
border-radius:8px;
border-left:4px solid #3b82f6;
}

.docs{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
margin-top:10px;
}

.doc{
background:#334155;
padding:12px;
border-radius:8px;
font-size:14px;
}

.highlight{
border:2px solid #22c55e;
background:#1e3a3a;
}

.prompt{
background:#111827;
padding:15px;
border-radius:8px;
font-family:monospace;
white-space:pre-wrap;
margin-top:10px;
}

.answer{
font-size:18px;
margin-top:10px;
color:#a5f3fc;
}

.vector{
font-size:13px;
color:#cbd5f5;
margin-top:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>RAG Pipeline Simulator</h1>

<div class="card">

<label>Ask a question</label>
<input id="question" placeholder="Example: What is Agile or What is RAG?">

<button onclick="runRAG()">Run RAG</button>

</div>


<div class="card">

<h3>Knowledge Base</h3>

<div id="docs" class="docs"></div>

</div>


<div class="card">

<h3>RAG Steps</h3>

<div id="steps"></div>

</div>

</div>



<script>

const knowledgeBase = [

"Agile is a software development methodology that focuses on iterative development, collaboration, and continuous feedback.",

"Scrum is an Agile framework where teams work in short sprints and include roles like Product Owner and Scrum Master.",

"Retrieval Augmented Generation (RAG) improves large language models by retrieving relevant documents before generating answers.",

"Vector databases store embeddings and allow semantic similarity search across documents.",

"Product discovery focuses on understanding user problems before building solutions.",

"Machine learning enables systems to learn patterns from data without explicit programming."

]



function renderDocs(){

const container = document.getElementById("docs")
container.innerHTML=""

knowledgeBase.forEach((doc,i)=>{

const div=document.createElement("div")
div.className="doc"
div.id="doc"+i
div.innerText=doc

container.appendChild(div)

})

}

renderDocs()



function createEmbedding(text){

let vector = new Array(10).fill(0)

text.toLowerCase().split(" ").forEach(word=>{

for(let i=0;i<word.length;i++){
vector[i % 10] += word.charCodeAt(i)
}

})

return vector

}



function cosineSimilarity(a,b){

let dot=0
let magA=0
let magB=0

for(let i=0;i<a.length;i++){

dot += a[i]*b[i]
magA += a[i]*a[i]
magB += b[i]*b[i]

}

magA=Math.sqrt(magA)
magB=Math.sqrt(magB)

return dot/(magA*magB)

}



function runRAG(){

const question=document.getElementById("question").value

const steps=document.getElementById("steps")
steps.innerHTML=""

document.querySelectorAll(".doc").forEach(d=>{
d.classList.remove("highlight")
})



/* STEP 1 */

const embedStep=document.createElement("div")
embedStep.className="step"
embedStep.innerHTML="<b>Step 1: Create Question Embedding</b>"

const qEmbedding=createEmbedding(question)

embedStep.innerHTML+=`<div class="vector">Vector: ${JSON.stringify(qEmbedding)}</div>`

steps.appendChild(embedStep)



/* STEP 2 */

const searchStep=document.createElement("div")
searchStep.className="step"
searchStep.innerHTML="<b>Step 2: Vector Similarity Search</b>"

let scoredDocs=knowledgeBase.map((doc,i)=>{

const emb=createEmbedding(doc)
const score=cosineSimilarity(qEmbedding,emb)

return {doc,index:i,score}

})

scoredDocs.sort((a,b)=>b.score-a.score)

const topDocs=scoredDocs.slice(0,2)

searchStep.innerHTML+="Top 2 documents retrieved based on similarity."

steps.appendChild(searchStep)



topDocs.forEach(d=>{
document.getElementById("doc"+d.index).classList.add("highlight")
})



/* STEP 3 */

const promptStep=document.createElement("div")
promptStep.className="step"
promptStep.innerHTML="<b>Step 3: Prompt Construction</b>"

const context=topDocs.map(d=>d.doc).join("\n")

const prompt=
`Answer the question using the context below.

Context:
${context}

Question:
${question}`

promptStep.innerHTML+=`<div class="prompt">${prompt}</div>`

steps.appendChild(promptStep)



/* STEP 4 */

const answerStep=document.createElement("div")
answerStep.className="step"
answerStep.innerHTML="<b>Step 4: Generated Answer</b>"

let answer=""

if(context.toLowerCase().includes("agile") && question.toLowerCase().includes("agile")){

answer="Agile is a development methodology that emphasizes iterative delivery, collaboration, and continuous improvement."

}

else if(context.toLowerCase().includes("scrum")){

answer="Scrum is a framework within Agile that structures work into sprints and defines roles like Product Owner and Scrum Master."

}

else if(context.toLowerCase().includes("rag")){

answer="Retrieval Augmented Generation (RAG) works by retrieving relevant documents and providing them as context to an LLM before generating an answer."

}

else if(context.toLowerCase().includes("vector")){

answer="Vector databases store embeddings and allow semantic search using similarity measures like cosine similarity."

}

else{

answer="The system retrieved relevant documents and generated an answer grounded in those documents."

}

answerStep.innerHTML+=`<div class="answer">${answer}</div>`

steps.appendChild(answerStep)

}

</script>

</body>
</html>
