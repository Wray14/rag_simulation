<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
margin:0;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:30px;
}

h1{
text-align:center;
font-weight:600;
margin-bottom:30px;
}

.container{
max-width:1100px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
padding:20px;
border-radius:14px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,0.08);
}

textarea,input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-top:10px;
background:#0f172a;
color:white;
}

button{
background:#6366f1;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#4f46e5;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:15px;
}

.box{
background:#020617;
padding:12px;
border-radius:8px;
font-size:14px;
}

.step{
opacity:0.5;
transition:0.3s;
}

.step.active{
opacity:1;
border-left:3px solid #6366f1;
padding-left:10px;
}

.result{
background:#020617;
padding:15px;
border-radius:8px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>RAG Pipeline Simulator</h1>

<div class="card">

<h3>1️⃣ Add Documents</h3>

<textarea id="docs" rows="6">
RAG stands for Retrieval Augmented Generation. 
It allows language models to answer questions using external knowledge.

Vector databases store embeddings for fast semantic search.

Cosine similarity helps find relevant document chunks.

Chunking splits large documents into smaller pieces for retrieval.
</textarea>

<button onclick="buildKB()">Build Knowledge Base</button>

</div>


<div class="card">

<h3>2️⃣ Ask a Question</h3>

<input id="query" placeholder="Example: What is cosine similarity?">

<button onclick="runQuery()">Run Retrieval</button>

</div>


<div class="card">

<h3>RAG Steps</h3>

<div class="grid">

<div id="step1" class="box step">
<b>Chunking</b>
<div id="chunks"></div>
</div>

<div id="step2" class="box step">
<b>Embeddings</b>
<div id="embeddings"></div>
</div>

<div id="step3" class="box step">
<b>Vector Database</b>
<div id="vectordb"></div>
</div>

<div id="step4" class="box step">
<b>Query Embedding</b>
<div id="queryEmbed"></div>
</div>

<div id="step5" class="box step">
<b>Similarity Search</b>
<div id="similarity"></div>
</div>

<div id="step6" class="box step">
<b>Prompt + Context</b>
<div id="prompt"></div>
</div>

<div id="step7" class="box step">
<b>Generated Answer</b>
<div id="answer"></div>
</div>

</div>

</div>

</div>

<script>

let chunks=[]
let vectors=[]

function activate(step){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"))
document.getElementById(step).classList.add("active")
}

function randomVector(){
return Array.from({length:5},()=>Math.random().toFixed(2))
}

function buildKB(){

activate("step1")

let text=document.getElementById("docs").value

chunks=text.split(".").map(c=>c.trim()).filter(c=>c)

document.getElementById("chunks").innerHTML=chunks.map(c=>"<div>"+c+"</div>").join("")

setTimeout(()=>{

activate("step2")

vectors=chunks.map(()=>randomVector())

document.getElementById("embeddings").innerHTML=vectors.map(v=>"<div>"+v+"</div>").join("")

},800)

setTimeout(()=>{

activate("step3")

document.getElementById("vectordb").innerHTML="Stored "+vectors.length+" vectors"

},1500)

}

function cosine(a,b){

let dot=0
let magA=0
let magB=0

for(let i=0;i<a.length;i++){

dot+=a[i]*b[i]
magA+=a[i]*a[i]
magB+=b[i]*b[i]

}

return dot/(Math.sqrt(magA)*Math.sqrt(magB))
}

function runQuery(){

let query=document.getElementById("query").value

activate("step4")

let qvec=randomVector().map(Number)

document.getElementById("queryEmbed").innerText=qvec

setTimeout(()=>{

activate("step5")

let scores=vectors.map(v=>cosine(v.map(Number),qvec))

let bestIndex=scores.indexOf(Math.max(...scores))

document.getElementById("similarity").innerHTML=
"Best match:<br>"+chunks[bestIndex]

setTimeout(()=>{

activate("step6")

let context=chunks[bestIndex]

let prompt="Context: "+context+" Question: "+query

document.getElementById("prompt").innerText=prompt

setTimeout(()=>{

activate("step7")

document.getElementById("answer").innerHTML=
"Based on retrieved context:<br><br>"+context

},800)

},800)

},800)

}

</script>

</body>
</html>
